{% set sdocs = payload[0] %}
{% set sdict = payload[1] %}
{% if sdocs and sdocs is iterable and sdocs|length > 0 %}
<link rel="stylesheet" href="/swiper-bundle.min.css">
<script>
  var script = document.createElement("script");
  script.src = "/swiper-bundle.min.js";
  script.onload = function () {
    var swiper = new Swiper(".mySwiper", {
      slidesPerView: 1,
      spaceBetween: 30,
      {% if sdict and sdict.loop %}
      loop: true,
      {% endif %}
      {% if sdict and sdict.autoplay %}
      autoplay: {
        delay: {{ sdict.interval or 5000 }},
        disableOnInteraction: false,
      },
      {% endif %}
      autoHeight: true,
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
  };
  document.body.appendChild(script);
</script>
<div class="section">
  <div class="section__body">
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        {%- for doc in sdocs -%}
        <div class="swiper-slide">
          <a href="{{ doc.url }}" title="{{ doc.title }}">
            <img src="{{ doc.img }}" alt="{{ doc.title }}" style="width:100%; height:200px;" loading="lazy" />
          </a>
        </div>
        {%- endfor -%}
      </div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-pagination"></div>
    </div>
  </div>
</div>
{% endif %}
